[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# /videos → /media redirect
[[redirects]]
  from = "/videos"
  to   = "/media"
  status = 301

# Required for Netlify Identity + Decap CMS
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
